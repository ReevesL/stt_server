name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ghcr.io/reevesl/stt_server:base
          cache-from: type=registry,ref=ghcr.io/reevesl/stt_server:buildcache-base
          cache-to: type=registry,ref=ghcr.io/reevesl/stt_server:buildcache-base,mode=max

  build-torch:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push torch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.torch
          push: true
          tags: ghcr.io/reevesl/stt_server:torch
          cache-from: type=registry,ref=ghcr.io/reevesl/stt_server:buildcache-torch
          cache-to: type=registry,ref=ghcr.io/reevesl/stt_server:buildcache-torch,mode=max

  build-app:
    needs: build-torch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: echo "version=$(grep '^VERSION' app/main.py | cut -d'"' -f2)" >> $GITHUB_OUTPUT

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/reevesl/stt_server:latest
            ghcr.io/reevesl/stt_server:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=ghcr.io/reevesl/stt_server:buildcache-app
          cache-to: type=registry,ref=ghcr.io/reevesl/stt_server:buildcache-app,mode=max
