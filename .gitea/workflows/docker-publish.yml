# Build and Publish Docker Image
name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."gitea.little.local:30380"]
              http = true
              insecure = true

      - name: Configure registry credentials
        run: |
          mkdir -p ~/.docker
          echo '{"auths":{"gitea.little.local:30380":{"auth":"'"$(echo -n "${{ gitea.actor }}:${{ secrets.REGISTRY_TOKEN }}" | base64 -w 0)"'"}}}' > ~/.docker/config.json

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            gitea.little.local:30380/reeves/stt_server:latest
            gitea.little.local:30380/reeves/stt_server:${{ gitea.sha }}
          cache-from: type=registry,ref=gitea.little.local:30380/reeves/stt_server:buildcache
          cache-to: type=registry,ref=gitea.little.local:30380/reeves/stt_server:buildcache,mode=max
