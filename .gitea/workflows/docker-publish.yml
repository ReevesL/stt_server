name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Gitea container registry
        uses: docker/login-action@v3
        with:
          registry: gitea.little.local:30380
          username: ${{ gitea.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            gitea.little.local:30380/reeves/stt_server:latest
            gitea.little.local:30380/reeves/stt_server:${{ gitea.sha }}
